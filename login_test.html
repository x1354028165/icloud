<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录测试</title>
</head>
<body>
    <h1>登录功能测试</h1>
    
    <form id="testLoginForm">
        <div>
            <label>用户名: <input type="text" id="testUsername" value="admin"></label>
        </div>
        <div>
            <label>密码: <input type="password" id="testPassword" value="drive2024"></label>
        </div>
        <div>
            <button type="submit" id="testLoginButton">测试登录</button>
        </div>
    </form>
    
    <div id="testResult" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    
    <script>
        document.getElementById('testLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('testUsername').value;
            const password = document.getElementById('testPassword').value;
            const resultDiv = document.getElementById('testResult');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                resultDiv.innerHTML = '<h3>登录测试结果:</h3><pre>' + JSON.stringify(result, null, 2) + '</pre>';
                
                if (result.success) {
                    // 测试文件API
                    const filesResponse = await fetch('/api/files', {
                        headers: {
                            'Authorization': `Bearer ${result.token}`
                        }
                    });
                    const filesResult = await filesResponse.json();
                    resultDiv.innerHTML += '<h3>文件API测试:</h3><pre>' + JSON.stringify(filesResult, null, 2) + '</pre>';
                }
                
            } catch (error) {
                resultDiv.innerHTML = '<h3>错误:</h3><p>' + error.message + '</p>';
            }
        });
    </script>
</body>
</html>
