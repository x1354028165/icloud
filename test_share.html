<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>分享功能测试</title>
    <style>
        body { font-family: Arial; margin: 20px; line-height: 1.6; }
        .test-item { 
            padding: 15px; margin: 10px 0; border: 1px solid #ccc; 
            background: #f9f9f9; cursor: pointer; border-radius: 5px;
        }
        .share-btn { 
            background: #1a73e8; color: white; border: none; 
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            margin: 5px;
        }
        .result { 
            margin-top: 10px; padding: 10px; background: #e8f5e8; 
            border-radius: 4px; display: none;
        }
        h2 { color: #1a73e8; }
    </style>
</head>
<body>
    <h2>🔗 分享功能测试</h2>
    
    <div class="test-section">
        <h3>测试1: 右键菜单测试</h3>
        <div class="test-item" data-file="test-document.pdf">
            📄 测试文档.pdf - 请右键点击我
        </div>
        <div class="test-item" data-file="test-image.jpg">
            🖼️ 测试图片.jpg - 请右键点击我
        </div>
        <div id="context-status">等待右键操作...</div>
    </div>
    
    <div class="test-section">
        <h3>测试2: 直接分享功能测试</h3>
        <button class="share-btn" onclick="testShareFunction('test-file-1.txt')">
            🔗 测试分享文件1
        </button>
        <button class="share-btn" onclick="testShareFunction('folder/test-file-2.jpg')">
            🔗 测试分享文件2
        </button>
        <div id="share-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>访问主系统</h3>
        <p><a href="/files/" target="_blank">🎯 打开 Modern Drive 主系统</a></p>
        <p><strong>使用方法：</strong></p>
        <ol>
            <li>登录主系统 (admin / drive2024)</li>
            <li>右键点击任意文件</li>
            <li>应该看到包含"🔗 分享"的右键菜单</li>
            <li>点击"🔗 分享"生成分享链接</li>
        </ol>
    </div>

    <script>
        // 模拟Token (测试用)
        const mockToken = "test-token-123";
        
        // 右键菜单测试
        document.addEventListener('contextmenu', function(e) {
            const testItem = e.target.closest('.test-item');
            if (testItem) {
                e.preventDefault();
                const fileName = testItem.getAttribute('data-file');
                document.getElementById('context-status').innerHTML = 
                    `✅ 右键菜单触发成功！<br>文件: ${fileName}<br>` +
                    `<button onclick="testShareFunction('${fileName}')" style="margin-top:5px;">🔗 测试分享此文件</button>`;
            }
        });
        
        // 分享功能测试
        function testShareFunction(fileName) {
            const resultDiv = document.getElementById('share-result');
            resultDiv.style.display = 'block';
            
            try {
                // 模拟分享链接生成
                const shareUrl = `${window.location.origin}/api/download?path=${encodeURIComponent(fileName)}&token=${encodeURIComponent(mockToken)}`;
                
                resultDiv.innerHTML = `
                    <h4>✅ 分享功能测试成功！</h4>
                    <p><strong>文件:</strong> ${fileName}</p>
                    <p><strong>分享链接:</strong></p>
                    <textarea readonly style="width:100%; height:60px;">${shareUrl}</textarea>
                    <p><small>* 这是测试链接，实际使用需要有效Token</small></p>
                `;
                
                // 尝试复制到剪贴板
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        resultDiv.innerHTML += '<p style="color:green;">📋 链接已复制到剪贴板！</p>';
                    });
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red;">❌ 分享功能错误: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
