<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录调试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 15px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h2>Modern Drive 登录调试</h2>
    <form id="debugForm">
        <div class="form-group">
            <label>用户名:</label>
            <input type="text" id="debugUser" value="admin" required>
        </div>
        <div class="form-group">
            <label>密码:</label>
            <input type="password" id="debugPass" value="drive2024" required>
        </div>
        <button type="submit">登录测试</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('debugForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在测试登录...';
            
            try {
                console.log('开始登录测试');
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('debugUser').value,
                        password: document.getElementById('debugPass').value
                    })
                });
                
                const data = await response.json();
                console.log('登录响应:', data);
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = '✅ 登录成功！<br>Token: ' + data.token.substring(0, 20) + '...';
                    
                    // 跳转到主界面
                    setTimeout(() => {
                        window.location.href = '/files/';
                    }, 2000);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '❌ 登录失败: ' + (data.error || '未知错误');
                }
            } catch (error) {
                console.error('登录错误:', error);
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ 网络错误: ' + error.message;
            }
        });
    </script>
</body>
</html>
