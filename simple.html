<!DOCTYPE html>
<html>
<head><title>文件测试</title></head>
<body>
    <h1>文件列表测试页面</h1>
    <button onclick="loadFiles()">点击加载文件</button>
    <div id="result"></div>
    
    <script>
    function loadFiles() {
        document.getElementById('result').innerHTML = '正在加载...';
        
        fetch('/api/files', {
            headers: { 'Authorization': 'Basic ' + btoa('admin:drive2024') }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            return response.text();
        })
        .then(text => {
            document.getElementById('result').innerHTML = '<pre>' + text + '</pre>';
        })
        .catch(error => {
            document.getElementById('result').innerHTML = '<p style="color:red">错误: ' + error + '</p>';
        });
    }
    </script>
</body>
</html>
