name: Deploy Vue3 Cloud Drive

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Deploy to server
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # 备份现有版本
          if [ -d "/var/www/cloud-drive" ]; then
            cp -r /var/www/cloud-drive /root/backups/cloud-drive-$(date +%Y%m%d-%H%M%S)
          fi
          
          # 创建临时目录
          mkdir -p /tmp/cloud-drive-deploy
          cd /tmp/cloud-drive-deploy
          
          # 克隆最新代码
          git clone https://github.com/x1354028165/icloud.git .
          
          # 安装依赖并构建
          npm ci
          npm run build
          
          # 部署到生产目录
          rm -rf /var/www/cloud-drive/*
          cp -r dist/* /var/www/cloud-drive/
          
          # 设置权限
          chown -R nginx:nginx /var/www/cloud-drive/
          chmod -R 644 /var/www/cloud-drive/*
          
          # 重载nginx
          nginx -t && systemctl reload nginx
          
          # 清理临时文件
          cd /
          rm -rf /tmp/cloud-drive-deploy
          
          echo "Deployment completed successfully"