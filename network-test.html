<!DOCTYPE html>
<html>
<head>
    <title>网络连接测试</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .test-item { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h2>Modern Drive 网络连接测试</h2>
    <p>如果看到这个页面，说明基本网络连接正常。</p>
    
    <button onclick="testAPI()">测试API连接</button>
    <button onclick="testAuth()">测试认证</button>
    <button onclick="location.reload()">刷新页面</button>
    
    <div id="results"></div>
    
    <script>
    function addResult(message, success = true) {
        const div = document.createElement('div');
        div.className = 'test-item ' + (success ? 'success' : 'error');
        div.innerHTML = new Date().toLocaleTimeString() + ': ' + message;
        document.getElementById('results').appendChild(div);
    }
    
    async function testAPI() {
        addResult('开始测试API连接...');
        try {
            const response = await fetch('/api/files', {
                headers: { 'Authorization': 'Basic ' + btoa('admin:drive2024') }
            });
            
            if (response.ok) {
                const data = await response.json();
                addResult(`✅ API连接成功！返回 ${data.items ? data.items.length : 0} 个文件`, true);
            } else {
                addResult(`❌ API响应错误: ${response.status}`, false);
            }
        } catch (error) {
            addResult(`❌ API连接失败: ${error.message}`, false);
        }
    }
    
    async function testAuth() {
        addResult('开始测试认证...');
        try {
            const response = await fetch('/api/files');
            if (response.status === 401) {
                addResult('✅ 认证系统正常工作 (需要认证)', true);
            } else {
                addResult(`⚠️ 认证响应异常: ${response.status}`, false);
            }
        } catch (error) {
            addResult(`❌ 认证测试失败: ${error.message}`, false);
        }
    }
    
    // 页面加载时自动测试
    window.onload = function() {
        addResult('页面加载完成');
        setTimeout(testAPI, 1000);
    };
    </script>
</body>
</html>
